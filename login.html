<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 | 海哥自媒体账号内容工作台</title>
    <script src="/auth.js"></script>
    <style>
      :root {
        color: #1d1d1f;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.92), transparent 32%),
          radial-gradient(circle at right 16% top 18%, rgba(214, 231, 255, 0.5), transparent 24%),
          linear-gradient(180deg, #fcfcfd 0%, #f5f5f7 100%);
        font-family:
          "SF Pro Text", "SF Pro Display", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #1d1d1f;
      }

      .login-shell {
        width: min(100%, 440px);
      }

      .login-card {
        padding: 34px 32px 30px;
        border: 1px solid rgba(255, 255, 255, 0.76);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow:
          0 26px 64px rgba(0, 0, 0, 0.09),
          inset 0 1px 0 rgba(255, 255, 255, 0.72);
        backdrop-filter: saturate(180%) blur(24px);
      }

      .brand-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border-radius: 999px;
        background: linear-gradient(180deg, #2f2f31, #161618);
        color: #ffffff;
        font-size: 13px;
        font-weight: 700;
      }

      .brand-copy strong {
        display: block;
        margin: 0;
        font-size: 20px;
        font-weight: 600;
        line-height: 1.2;
      }

      .brand-copy span {
        display: block;
        margin-top: 4px;
        color: #6e6e73;
        font-size: 12px;
        line-height: 1.35;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 34px;
        font-weight: 600;
        line-height: 1.08;
        letter-spacing: -0.02em;
      }

      p {
        margin: 0;
        color: #424245;
        font-size: 14px;
        line-height: 1.6;
      }

      form {
        margin-top: 28px;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-bottom: 18px;
      }

      .field label {
        font-size: 13px;
        font-weight: 600;
        color: #6e6e73;
      }

      .field input {
        width: 100%;
        height: 50px;
        padding: 0 16px;
        border: 1px solid rgba(29, 29, 31, 0.12);
        border-radius: 15px;
        background: rgba(255, 255, 255, 0.92);
        color: #1d1d1f;
        font: inherit;
        outline: none;
        transition: border-color 180ms ease, box-shadow 180ms ease, background-color 180ms ease;
      }

      .field input:focus {
        border-color: rgba(0, 102, 204, 0.34);
        box-shadow: 0 0 0 4px rgba(0, 102, 204, 0.14);
      }

      .submit-button {
        width: 100%;
        height: 52px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(180deg, #0071e3 0%, #0066cc 100%);
        color: #ffffff;
        font: inherit;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 16px 32px rgba(0, 102, 204, 0.2);
        transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease;
      }

      .submit-button:hover {
        transform: translateY(-1px);
        box-shadow: 0 18px 36px rgba(0, 102, 204, 0.24);
      }

      .submit-button:disabled {
        opacity: 0.72;
        cursor: wait;
        transform: none;
      }

      .hint-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-top: 14px;
        color: #6e6e73;
        font-size: 12px;
        line-height: 1.5;
      }

      .status {
        min-height: 20px;
        margin-top: 14px;
        color: #b42318;
        font-size: 13px;
        line-height: 1.5;
      }

      .status.success {
        color: #287d3c;
      }

      @media (max-width: 520px) {
        .login-card {
          padding: 28px 22px 24px;
          border-radius: 22px;
        }

        h1 {
          font-size: 30px;
        }

        .hint-row {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="login-shell">
      <section class="login-card" aria-labelledby="login-title">
        <div class="brand-row">
          <div class="brand-mark">海哥</div>
          <div class="brand-copy">
            <strong>内容工作台</strong>
            <span>火锅食材 B 端账号登录入口</span>
          </div>
        </div>
        <h1 id="login-title">欢迎回来</h1>
        <p>登录后进入海哥自媒体账号内容工作台。当前为本地临时账号验证，后续可直接切换到阿里云远程认证接口。</p>

        <form id="login-form" novalidate>
          <div class="field">
            <label for="username">账号</label>
            <input id="username" name="username" type="text" autocomplete="username" placeholder="请输入账号" />
          </div>
          <div class="field">
            <label for="password">密码</label>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="请输入密码" />
          </div>
          <button class="submit-button" id="submit-button" type="submit">登录并进入主页</button>
          <div class="status" id="status" aria-live="polite"></div>
          <div class="hint-row">
            <span>默认账号：admin</span>
            <span>默认密码：123456</span>
          </div>
        </form>
      </section>
    </main>

    <script>
      window.AppAuth.redirectIfAuthenticated();

      var form = document.getElementById("login-form");
      var usernameInput = document.getElementById("username");
      var passwordInput = document.getElementById("password");
      var submitButton = document.getElementById("submit-button");
      var statusNode = document.getElementById("status");

      function setStatus(message, type) {
        statusNode.textContent = message || "";
        statusNode.className = type === "success" ? "status success" : "status";
      }

      form.addEventListener("submit", async function handleSubmit(event) {
        event.preventDefault();
        submitButton.disabled = true;
        setStatus("");

        try {
          await window.AppAuth.login({
            username: usernameInput.value,
            password: passwordInput.value,
          });

          setStatus("登录成功，正在进入主页。", "success");
          window.location.replace("/index.html");
        } catch (error) {
          setStatus(error && error.message ? error.message : "登录失败，请稍后再试。");
        } finally {
          submitButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
