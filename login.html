<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>登录 | 海哥自媒体账号内容工作台</title>
    <script src="/app-config.js"></script>
    <script src="/auth.js"></script>
    <style>
      :root {
        color: #1d1d1f;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.92), transparent 32%),
          radial-gradient(circle at right 16% top 18%, rgba(214, 231, 255, 0.5), transparent 24%),
          linear-gradient(180deg, #fcfcfd 0%, #f5f5f7 100%);
        font-family:
          "SF Pro Text", "SF Pro Display", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #1d1d1f;
      }

      .login-shell {
        width: min(100%, 440px);
      }

      .login-card {
        padding: 34px 32px 30px;
        border: 1px solid rgba(255, 255, 255, 0.76);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow:
          0 26px 64px rgba(0, 0, 0, 0.09),
          inset 0 1px 0 rgba(255, 255, 255, 0.72);
        backdrop-filter: saturate(180%) blur(24px);
      }

      .brand-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border-radius: 999px;
        background: linear-gradient(180deg, #2f2f31, #161618);
        color: #ffffff;
        font-size: 13px;
        font-weight: 700;
      }

      .brand-copy strong {
        display: block;
        margin: 0;
        font-size: 20px;
        font-weight: 600;
        line-height: 1.2;
      }

      .brand-copy span {
        display: block;
        margin-top: 4px;
        color: #6e6e73;
        font-size: 12px;
        line-height: 1.35;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 34px;
        font-weight: 600;
        line-height: 1.08;
        letter-spacing: -0.02em;
      }

      p {
        margin: 0;
        color: #424245;
        font-size: 14px;
        line-height: 1.6;
      }

      form {
        margin-top: 28px;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-bottom: 18px;
      }

      .field label {
        font-size: 13px;
        font-weight: 600;
        color: #6e6e73;
      }

      .field input {
        width: 100%;
        height: 50px;
        padding: 0 16px;
        border: 1px solid rgba(29, 29, 31, 0.12);
        border-radius: 15px;
        background: rgba(255, 255, 255, 0.92);
        color: #1d1d1f;
        font: inherit;
        outline: none;
        transition: border-color 180ms ease, box-shadow 180ms ease, background-color 180ms ease;
      }

      .field input:focus {
        border-color: rgba(0, 102, 204, 0.34);
        box-shadow: 0 0 0 4px rgba(0, 102, 204, 0.14);
      }

      .code-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 128px;
        gap: 10px;
      }

      .code-button {
        height: 50px;
        border: 1px solid rgba(0, 102, 204, 0.18);
        border-radius: 15px;
        background: rgba(0, 113, 227, 0.08);
        color: #0066cc;
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .code-button:disabled {
        opacity: 0.62;
        cursor: wait;
      }

      .submit-button {
        width: 100%;
        height: 52px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(180deg, #0071e3 0%, #0066cc 100%);
        color: #ffffff;
        font: inherit;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 16px 32px rgba(0, 102, 204, 0.2);
        transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease;
      }

      .submit-button:hover {
        transform: translateY(-1px);
        box-shadow: 0 18px 36px rgba(0, 102, 204, 0.24);
      }

      .submit-button:disabled {
        opacity: 0.72;
        cursor: wait;
        transform: none;
      }

      .hint-row {
        display: grid;
        gap: 12px;
        margin-top: 14px;
        color: #6e6e73;
        font-size: 12px;
        line-height: 1.5;
      }

      .status {
        min-height: 20px;
        margin-top: 14px;
        color: #b42318;
        font-size: 13px;
        line-height: 1.5;
      }

      .status.success {
        color: #287d3c;
      }

      @media (max-width: 520px) {
        .login-card {
          padding: 28px 22px 24px;
          border-radius: 22px;
        }

        h1 {
          font-size: 30px;
        }

        .code-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="login-shell">
      <section class="login-card" aria-labelledby="login-title">
        <div class="brand-row">
          <div class="brand-mark">海哥</div>
          <div class="brand-copy">
            <strong>内容工作台</strong>
            <span>火锅食材 B 端账号登录入口</span>
          </div>
        </div>
        <h1 id="login-title">欢迎回来</h1>
        <p>使用手机号验证码登录。首次登录会自动注册为普通账号，管理员手机号登录后可管理账号权限。</p>

        <form id="login-form" novalidate>
          <div class="field">
            <label for="phone">手机号</label>
            <input id="phone" name="phone" type="tel" autocomplete="tel" inputmode="numeric" placeholder="请输入 11 位手机号" />
          </div>
          <div class="field">
            <label for="code">验证码</label>
            <div class="code-row">
              <input id="code" name="code" type="text" autocomplete="one-time-code" inputmode="numeric" maxlength="6" placeholder="请输入验证码" />
              <button class="code-button" id="code-button" type="button">获取验证码</button>
            </div>
          </div>
          <button class="submit-button" id="submit-button" type="submit">登录并进入主页</button>
          <div class="status" id="status" aria-live="polite"></div>
          <div class="hint-row">
            <span>本地模拟阶段会直接显示测试验证码。</span>
            <span>默认管理员手机号可通过 AUTH_ADMIN_PHONE 配置。</span>
          </div>
        </form>
      </section>
    </main>

    <script>
      window.AppAuth.redirectIfAuthenticated();

      var form = document.getElementById("login-form");
      var phoneInput = document.getElementById("phone");
      var codeInput = document.getElementById("code");
      var codeButton = document.getElementById("code-button");
      var submitButton = document.getElementById("submit-button");
      var statusNode = document.getElementById("status");
      var countdownTimer = null;

      function setStatus(message, type) {
        statusNode.textContent = message || "";
        statusNode.className = type === "success" ? "status success" : "status";
      }

      function startCountdown(seconds) {
        var remaining = seconds;
        codeButton.disabled = true;
        codeButton.textContent = remaining + "秒后重试";
        window.clearInterval(countdownTimer);
        countdownTimer = window.setInterval(function tick() {
          remaining -= 1;
          if (remaining <= 0) {
            window.clearInterval(countdownTimer);
            codeButton.disabled = false;
            codeButton.textContent = "获取验证码";
            return;
          }
          codeButton.textContent = remaining + "秒后重试";
        }, 1000);
      }

      codeButton.addEventListener("click", async function handleSendCode() {
        codeButton.disabled = true;
        setStatus("");

        try {
          var result = await window.AppAuth.sendCode(phoneInput.value);
          codeInput.value = result.devCode || "";
          setStatus(result.devCode ? "本地测试验证码：" + result.devCode : "验证码已发送。", "success");
          startCountdown(60);
        } catch (error) {
          codeButton.disabled = false;
          setStatus(error && error.message ? error.message : "验证码发送失败，请稍后再试。");
        }
      });

      form.addEventListener("submit", async function handleSubmit(event) {
        event.preventDefault();
        submitButton.disabled = true;
        setStatus("");

        try {
          await window.AppAuth.login({
            phone: phoneInput.value,
            code: codeInput.value,
          });

          setStatus("登录成功，正在进入主页。", "success");
          window.location.replace("/index.html");
        } catch (error) {
          setStatus(error && error.message ? error.message : "登录失败，请稍后再试。");
        } finally {
          submitButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
