# ============================================================
# 海哥内容工作台 — Nginx 反向代理配置
# ============================================================
# 放置路径：/etc/nginx/conf.d/haizong.conf
# 测试语法：nginx -t
# 重载配置：systemctl reload nginx
# ============================================================

# 后端 upstream
upstream haizong_backend {
    server 127.0.0.1:4280;
    keepalive 64;
}

# 速率限制区域（定义在 nginx.conf 的 http 块中）
# 如果尚未定义，需要在 /etc/nginx/nginx.conf 的 http {} 中加入：
#   limit_req_zone $binary_remote_addr zone=haizong_api:10m rate=10r/s;

server {
    listen 80;
    server_name your-domain.com;   # ← 改成你的域名或 ECS 公网 IP

    # Let's Encrypt 验证目录
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 强制跳转 HTTPS（证书配置好后取消注释）
    # return 301 https://$host$request_uri;

    # 临时：直接代理到 Node
    location / {
        proxy_pass http://haizong_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

