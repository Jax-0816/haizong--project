# 海宗内容工作台 - 腾讯云 Ubuntu Nginx 反向代理
# 放置路径：/etc/nginx/conf.d/haizong-project.conf
#
# 公网只开放 80 端口，应用容器只绑定 127.0.0.1:4280。

upstream haizong_project_backend {
    server 127.0.0.1:4280;
    keepalive 32;
}

server {
    listen 80;
    server_name 124.222.212.16;

    client_max_body_size 20m;

    location / {
        proxy_pass http://haizong_project_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
